<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — Learn</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── THEME TOKENS ─────────────────────────────────────── */
/* True neumorphism (soft UI). Surfaces share the page color; depth comes only from a
   dark bottom-right + light top-left shadow pair derived from the surface tone.
   Raised = --sh; pressed/recessed = --sh-in. No hard borders (--brd transparent;
   structural separators use --div). */
:root{
  --bg:#e7eaf1;--surf:#e7eaf1;--card:#e7eaf1;--brd:transparent;--div:#ccd3e0;
  --acc:#5865f2;--grn:#10b981;--red:#ef4444;--yel:#f59e0b;--pur:#7c3aed;
  --txt:#2b3350;--m:#697089;--m2:#8a92a6;
  --d-sh:#b6bfd0;--l-sh:#ffffff;
  --sh:6px 6px 14px var(--d-sh),-6px -6px 14px var(--l-sh);
  --sh-lg:10px 10px 22px var(--d-sh),-8px -8px 20px var(--l-sh);
  --sh-sm:4px 4px 9px var(--d-sh),-4px -4px 9px var(--l-sh);
  --sh-in:inset 3px 3px 6px var(--d-sh),inset -3px -3px 6px var(--l-sh);
  --sh-press:inset 2px 2px 4px var(--d-sh),inset -2px -2px 4px var(--l-sh);
}
[data-theme="dark"]{
  --bg:#2a2e37;--surf:#2a2e37;--card:#2a2e37;--brd:transparent;--div:#3a3f4b;
  --txt:#e6e9f0;--m:#9aa3b5;--m2:#7f8799;
  --d-sh:#1f2228;--l-sh:#353a45;
}

/* ── RESET & BASE ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--txt);min-height:100vh;
  transition:background .25s,color .25s}
a{color:var(--acc);text-decoration:none}
strong{font-weight:700}

/* ── HEADER ───────────────────────────────────────────── */
header{
  background:var(--surf);border-bottom:1px solid var(--brd);
  padding:14px 24px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;box-shadow:var(--sh)
}
.logo{font-size:1.1rem;font-weight:800;color:var(--acc);flex:1}
.logo span{color:var(--txt);font-weight:400;font-size:.85rem;margin-left:8px}
.hbtn{
  padding:6px 12px;border-radius:7px;border:1px solid var(--brd);
  background:none;color:var(--m);cursor:pointer;font-size:.8rem;
  transition:all .15s;white-space:nowrap
}
.hbtn:hover{background:var(--brd);color:var(--txt)}
#translate-btn{text-decoration:none}

/* ── LAYOUT ───────────────────────────────────────────── */
main{max-width:1020px;margin:0 auto;padding:28px 18px}
.screen{display:none}.screen.active{display:block}

/* ── HOME SCREEN ──────────────────────────────────────── */
.home-hero{text-align:center;padding:32px 0 24px}
.home-hero h2{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.home-hero p{color:var(--m);font-size:.9rem;max-width:500px;margin:0 auto}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:24px}
.topic-card{
  background:var(--card);border:1px solid var(--brd);border-radius:14px;
  padding:22px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)
}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);border-color:var(--acc)}
.tc-icon{font-size:2rem;margin-bottom:10px}
.tc-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.tc-desc{font-size:.8rem;color:var(--m);margin-bottom:14px;line-height:1.5}
.tc-meta{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tc-badge{font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:600;
  background:var(--bg);border:1px solid var(--brd);color:var(--m)}
.tc-wiki{font-size:.7rem;color:var(--m2);margin-bottom:14px}
.tc-wiki summary{cursor:pointer;user-select:none}
.tc-wiki li{margin-left:14px;margin-top:2px;font-size:.68rem;list-style:none}
.tc-wiki li a{color:var(--m2);text-decoration:underline;text-underline-offset:2px;
  font-family:monospace;word-break:break-all}
.tc-wiki li a:hover{color:var(--acc)}

/* Manage-topics toolbar + hide controls */
.home-toolbar{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.home-toolbar .spacer{flex:1}
.home-toolbar .ht-note{font-size:.74rem;color:var(--m2)}
.topic-card.manage{cursor:default}
.topic-card.is-hidden{opacity:.5}
.tc-hide{
  position:absolute;top:10px;right:10px;z-index:2;
  padding:4px 9px;border-radius:7px;border:1px solid var(--brd);
  background:var(--surf);color:var(--m);cursor:pointer;font-size:.72rem;font-weight:600;
  transition:all .15s
}
.tc-hide:hover{border-color:var(--acc);color:var(--acc)}
.tc-hide.unhide{border-color:var(--grn);color:var(--grn)}
.topic-card{position:relative}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:.86rem;
  font-weight:600;transition:all .2s;display:inline-block}
.btn-acc{background:var(--acc);color:#fff;width:100%;text-align:center}
.btn-acc:hover{filter:brightness(1.1)}
.btn-sec{background:var(--brd);color:var(--txt)}.btn-sec:hover{filter:brightness(.95)}
.btn-grn{background:var(--grn);color:#fff}.btn-grn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.38;cursor:default}

/* ── TOPIC SCREEN ─────────────────────────────────────── */
.topic-topbar{
  display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap
}
.back-btn{
  background:none;border:1px solid var(--brd);border-radius:8px;
  padding:7px 12px;cursor:pointer;color:var(--m);font-size:.82rem;
  transition:all .15s;white-space:nowrap
}
.back-btn:hover{border-color:var(--acc);color:var(--acc)}
.topic-topbar-title{font-weight:700;font-size:1rem;flex:1}
.mode-tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--brd);
  border-radius:9px;padding:3px}
.mbttn{padding:5px 12px;border-radius:6px;border:none;background:none;
  color:var(--m);cursor:pointer;font-size:.8rem;font-weight:500;transition:all .15s}
.mbttn.active{background:var(--acc);color:#fff}

/* ── SLIDE CHROME ─────────────────────────────────────── */
.slide-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sdots{display:flex;gap:5px}
.sdot{
  width:24px;height:24px;border-radius:50%;border:2px solid var(--brd);
  background:none;color:var(--m);cursor:pointer;font-size:.68rem;
  font-weight:700;transition:all .2s
}
.sdot.active{background:var(--acc);border-color:var(--acc);color:#fff}
.sdot:hover:not(.active){border-color:var(--acc)}
.slbl{font-size:.78rem;color:var(--m);margin-left:4px}

.slide{display:none}.slide.active{display:block}
.s2{display:grid;grid-template-columns:1fr 1.05fr;gap:18px;align-items:start}
@media(max-width:700px){.s2{grid-template-columns:1fr}}
.s-full{}

.s-num{font-size:.6rem;font-weight:800;letter-spacing:.1em;color:var(--acc);
  text-transform:uppercase;margin-bottom:5px}
.s-ttl{font-size:1.1rem;font-weight:700;margin-bottom:10px;line-height:1.35}
.s-body{font-size:.84rem;color:var(--m);line-height:1.7;margin-bottom:12px}
.fml{
  background:var(--bg);border:1px solid var(--brd);border-radius:8px;
  padding:10px 14px;font-family:monospace;font-size:.88rem;
  color:var(--pur);text-align:center;margin:10px 0
}
[data-theme="dark"] .fml{background:var(--surf)}
.kp{
  margin:7px 0;padding:10px 14px;border-left:3px solid var(--brd);
  border-radius:0 6px 6px 0;font-size:.8rem;color:var(--m);
  background:var(--bg);line-height:1.55
}
[data-theme="dark"] .kp{background:var(--surf)}
.kp.blue{border-left-color:var(--acc);background:rgba(88,101,242,.06)}
.kp.green{border-left-color:var(--grn);background:rgba(16,185,129,.06)}
.kp.yellow{border-left-color:var(--yel);background:rgba(245,158,11,.06)}
.kp.red{border-left-color:var(--red);background:rgba(239,68,68,.06)}

.st{width:100%;border-collapse:collapse;font-size:.78rem;margin:10px 0}
.st th{background:var(--bg);padding:7px 10px;text-align:left;
  color:var(--m);font-weight:600;border-bottom:2px solid var(--brd)}
[data-theme="dark"] .st th{background:var(--surf)}
.st td{padding:7px 10px;border-bottom:1px solid var(--brd)}

/* Risk map */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
@media(max-width:480px){.rg{grid-template-columns:1fr}}
.rcat{background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:12px}
[data-theme="dark"] .rcat{background:var(--surf)}
.rcat h4{font-size:.76rem;font-weight:700;margin-bottom:8px}
.ri{display:flex;align-items:flex-start;gap:7px;padding:5px 0;
  font-size:.78rem;color:var(--m)}
.ri:not(:last-child){border-bottom:1px solid var(--brd)}
.ri .ico{font-size:.9rem;margin-top:1px;flex-shrink:0}

/* Calc panel */
.s-calc{
  background:var(--card);border:1px solid var(--brd);border-radius:12px;
  padding:18px;box-shadow:var(--sh)
}
.s-calc h4{font-size:.82rem;font-weight:700;color:var(--acc);margin-bottom:12px}
.ig{margin-bottom:9px}
.ig label{display:block;font-size:.7rem;color:var(--m);margin-bottom:4px;font-weight:500}
.ig input,.ig select{
  width:100%;background:var(--bg);border:1px solid var(--brd);
  border-radius:6px;padding:6px 10px;color:var(--txt);font-size:.84rem
}
[data-theme="dark"] .ig input,[data-theme="dark"] .ig select{background:var(--surf)}
.ig input[type=range]{padding:5px 0;accent-color:var(--acc)}
.ig input:focus,.ig select:focus{outline:none;border-color:var(--acc)}
.ig select option{background:var(--surf)}
.ig2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rbox{
  background:rgba(88,101,242,.07);border:1px solid rgba(88,101,242,.18);
  border-radius:8px;padding:10px;text-align:center;margin:10px 0
}
.rl{font-size:.65rem;color:var(--m);text-transform:uppercase;letter-spacing:.05em}
.rv{font-size:1.45rem;font-weight:800;color:var(--acc);margin:2px 0}
.rs{font-size:.68rem;color:var(--m)}
.cw{height:165px;margin-top:10px}
.cw-note{font-size:.64rem;color:var(--m2);text-align:center;margin-top:4px}

/* Wiki source links */
.wiki-src{font-size:.68rem;color:var(--m2);margin-top:14px;padding-top:10px;
  border-top:1px dashed var(--brd)}
.wiki-src a{color:var(--m2);text-decoration:underline;text-underline-offset:2px}
.wiki-src a:hover{color:var(--acc)}

/* Slide footer */
.sl-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:18px;gap:10px
}
.sl-ctr{font-size:.8rem;color:var(--m);text-align:center}

/* ── QUIZ ─────────────────────────────────────────────── */
.qhdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.qlb{font-size:.78rem;color:var(--m);white-space:nowrap}
.prog{flex:1;height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.scb{font-size:.78rem;font-weight:700;color:var(--grn);white-space:nowrap}
.qcard{
  background:var(--card);border:1px solid var(--brd);border-radius:12px;
  padding:24px;box-shadow:var(--sh)
}
.qcat{
  display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;
  font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  background:rgba(88,101,242,.1);color:var(--acc);margin-bottom:11px
}
.qtxt{font-size:1rem;font-weight:600;line-height:1.6;margin-bottom:5px}
.qhnt{font-size:.76rem;color:var(--m);margin-bottom:18px}
.opts{display:grid;gap:8px}
.opt{
  display:flex;align-items:center;gap:11px;background:var(--surf);
  border:none;border-radius:12px;padding:13px 16px;min-height:48px;
  color:var(--txt);text-align:left;cursor:pointer;font-size:.84rem;
  box-shadow:var(--sh-sm);transition:box-shadow .14s ease,transform .12s ease,color .15s
}
.opt:hover:not(:disabled){box-shadow:var(--sh)}
.opt:active:not(:disabled){box-shadow:var(--sh-press)}
/* Answered: the chosen option + the correct one press INTO the surface (concave) with color */
.opt.correct{box-shadow:var(--sh-press);background:rgba(16,185,129,.12);color:#0f7a5a}
[data-theme="dark"] .opt.correct{color:#6ee7b7}
.opt.wrong{box-shadow:var(--sh-press);background:rgba(239,68,68,.12);color:#b3261e}
[data-theme="dark"] .opt.wrong{color:#fca5a5}
.opt:disabled:not(.correct):not(.wrong){opacity:.5;box-shadow:none}
.opt:disabled{cursor:default}
.olbl{
  width:24px;height:24px;border-radius:50%;background:var(--div);
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;flex-shrink:0;color:var(--m)
}
.opt.correct .olbl{background:var(--grn);color:#fff}
.opt.wrong .olbl{background:var(--red);color:#fff}
.exp{
  margin-top:14px;padding:11px 14px;border-left:3px solid var(--acc);
  border-radius:0 7px 7px 0;font-size:.82rem;line-height:1.65;
  color:var(--m);background:rgba(88,101,242,.05)
}
.exp strong{color:var(--txt)}
.exp-src{margin-top:12px;padding-top:11px;border-top:1px solid var(--div);
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.72rem;color:var(--m);font-weight:700}
.exp-src .esl{display:inline-block;padding:4px 11px;border-radius:99px;background:var(--surf);
  box-shadow:var(--sh-sm);color:var(--m);text-decoration:none;font-weight:600;font-family:inherit;
  transition:box-shadow .14s,color .15s}
.exp-src .esl:hover{color:var(--acc)}
.exp-src .esl:active{box-shadow:var(--sh-press)}
.qnav{display:flex;justify-content:flex-end;margin-top:14px}
.results{text-align:center;padding:24px 0}
.sring{
  width:110px;height:110px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px
}
.sinn{
  width:86px;height:86px;border-radius:50%;background:var(--card);
  display:flex;flex-direction:column;align-items:center;justify-content:center
}
.sn{font-size:1.7rem;font-weight:800;color:var(--acc)}
.sd{font-size:.7rem;color:var(--m)}
.smsg{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.ssub{color:var(--m);margin-bottom:20px;font-size:.84rem;
  max-width:360px;margin-left:auto;margin-right:auto}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

/* ── FOOTER ───────────────────────────────────────────── */
footer{text-align:center;padding:24px;font-size:.72rem;color:var(--m2);
  border-top:1px solid var(--brd);margin-top:40px}

/* ── Neumorphism component layer (raised controls, recessed inputs/engraved boxes) ── */
footer,.wiki-src,.exp-src{border-color:var(--div)}
.st th,.st td{border-bottom-color:var(--div)}
.olbl{background:var(--div)}
.opt{box-shadow:var(--sh-sm);transition:box-shadow .14s ease,transform .12s ease,color .15s}
.opt:hover:not(:disabled){box-shadow:var(--sh)}
.btn,.hbtn,.back-btn,.tc-hide,.sdot{box-shadow:var(--sh-sm)}
/* Click = a tiny concave press on the convex (raised) elements */
.btn:active,.hbtn:active,.back-btn:active,.sdot:active,.tc-hide:active,.mbttn:active,
.opt:active:not(:disabled),.topic-card:active{box-shadow:var(--sh-press)}
.btn-sec{background:var(--surf)}
.hbtn.icon-only{width:40px;height:40px;padding:0;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;font-size:1.05rem}
.back-btn{border-radius:50%;width:42px;height:42px;padding:0;display:inline-flex;
  align-items:center;justify-content:center;font-size:1.15rem;font-weight:700}
#pb{min-width:48px;font-size:1.15rem;font-weight:700}
/* Clear object sizing — min ~44px tap target (Apple HIG / WCAG 2.5.5; Material 48dp) */
.btn{min-height:44px}
.hbtn{min-height:40px;display:inline-flex;align-items:center}
.mbttn{min-height:40px;padding:8px 16px}
.mbttn.active{box-shadow:var(--sh-sm)}
.sdot{background:var(--surf)}
/* Flat (no carved cavities) — outlined boxes + accent stripes, like the reference */
.exp,.kp,.rbox{box-shadow:none}
.fml,.rcat,.mode-tabs{box-shadow:none;border:1px solid var(--div)}
.ig input,.ig select{box-shadow:none;border:1px solid var(--div)}
.prog{background:var(--div);box-shadow:none}

/* ── Liquid layer: glass header + fluid flow (neumorphic content stays opaque) ── */
header{
  background:color-mix(in srgb,var(--bg) 60%,transparent);
  -webkit-backdrop-filter:blur(16px) saturate(170%);
  backdrop-filter:blur(16px) saturate(170%);
  box-shadow:0 6px 22px rgba(40,50,90,.10),inset 0 1px 0 rgba(255,255,255,.6);
  border-bottom:1px solid var(--div)
}
[data-theme="dark"] header{box-shadow:0 6px 22px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06)}

/* Springy interactions */
.topic-card,.opt,.btn,.hbtn,.sdot,.back-btn{
  transition:box-shadow .18s cubic-bezier(.22,1,.36,1),transform .18s cubic-bezier(.22,1,.36,1),color .15s,border-color .15s}
.opt:active:not(:disabled){transform:scale(.985)}
.btn-acc:active,.btn-grn:active{transform:scale(.98)}

/* Fluid entrances */
@keyframes riseIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.screen.active .qcard{animation:popIn .42s cubic-bezier(.22,1,.36,1)}
.topic-card{animation:riseIn .5s cubic-bezier(.22,1,.36,1) backwards}
.topic-card:nth-child(2){animation-delay:.05s}.topic-card:nth-child(3){animation-delay:.1s}
.topic-card:nth-child(4){animation-delay:.15s}.topic-card:nth-child(5){animation-delay:.2s}
.topic-card:nth-child(6){animation-delay:.25s}.topic-card:nth-child(n+7){animation-delay:.3s}
.slide.active{animation:riseIn .4s cubic-bezier(.22,1,.36,1)}
.exp{animation:riseIn .3s ease}

/* Seamless screen transitions (View Transitions API) */
@media (prefers-reduced-motion:no-preference){
  ::view-transition-old(root){animation:vtfade .26s ease both}
  ::view-transition-new(root){animation:vtfade .34s cubic-bezier(.22,1,.36,1) reverse both}
}
@keyframes vtfade{to{opacity:0}}

@media (prefers-reduced-motion:reduce){
  *,::before,::after{animation-duration:.001ms!important;transition-duration:.001ms!important}
}
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Second Brain
    <span>Karpathy LLM Wiki</span>
  </div>
  <a class="hbtn icon-only" href="vocab.html" title="Vocabulary dictionary" aria-label="Vocabulary dictionary">📚</a>
  <a class="hbtn icon-only" href="requests.html" title="Learning requests" aria-label="Learning requests">📥</a>
  <a class="hbtn icon-only" id="translate-btn" href="#" onclick="openTranslate(event)" title="Translate page" aria-label="Translate page">🌐</a>
  <button class="hbtn icon-only" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark" aria-label="Toggle light/dark">🌙</button>
</header>

<main>

<!-- ══ HOME ══════════════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h2>Learn from the Wiki</h2>
    <p>Slides with interactive calculators, then quiz yourself. Topics are driven by the <code>/wiki/</code> knowledge base.</p>
  </div>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ══ TOPIC (slides + quiz) ════════════════════════════ -->
<div id="screen-topic" class="screen">
  <div class="topic-topbar">
    <button class="back-btn" onclick="goHome()" title="All topics" aria-label="All topics">←</button>
    <div class="topic-topbar-title" id="topic-title"></div>
    <div class="mode-tabs">
      <button class="mbttn active" id="btn-slides" onclick="setMode('slides')">📖 Slides</button>
      <button class="mbttn" id="btn-quiz"   onclick="setMode('quiz')">📝 Quiz</button>
    </div>
  </div>

  <!-- Slides view -->
  <div id="view-slides">
    <div class="slide-bar">
      <div class="sdots" id="sdots"></div>
      <div class="slbl" id="slbl"></div>
    </div>
    <div id="slides-container"></div>
    <div class="sl-foot">
      <button class="btn btn-sec" id="pb" onclick="prevS()" title="Previous slide" aria-label="Previous slide">←</button>
      <div class="sl-ctr">
        <div id="sctr"></div>
      </div>

<script src="topics.js"></script>
<script>
/* ══════════════════════════════════════════════════════════
   THEME
══════════════════════════════════════════════════════════ */
const root = document.documentElement;
const themeBtn = document.getElementById('theme-btn');

// Auto-detect on first load, then use stored pref
const stored = localStorage.getItem('quiz-theme');
const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const initTheme = stored || (systemDark ? 'dark' : 'light');
root.setAttribute('data-theme', initTheme);
themeBtn.textContent = initTheme === 'dark' ? '☀️' : '🌙';

function toggleTheme() {
  const t = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('quiz-theme', t);
  // Redraw active chart (colors change with theme)
  if (activeTopic && activeSlide !== null) setTimeout(initSlideCalc, 60);
}

/* ══════════════════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════════════════ */
const WIKI_BASE = 'https://github.com/lucasmasunoacn/obsidian/blob/main/';
let manageMode = false;

function getHidden() {
  try { return JSON.parse(localStorage.getItem('quiz-hidden-topics') || '[]'); }
  catch { return []; }
}
function setHidden(arr) { localStorage.setItem('quiz-hidden-topics', JSON.stringify([...new Set(arr)])); }
function toggleHidden(id) {
  const h = getHidden();
  setHidden(h.includes(id) ? h.filter(x => x !== id) : [...h, id]);
  buildHome();
}
function toggleManage() { manageMode = !manageMode; buildHome(); }
function resetHidden() { setHidden([]); buildHome(); }

// Clickable source list → links to the obsidian wiki on GitHub
function wikiLinks(pages) {
  return (pages || []).map(p => {
    const url  = WIKI_BASE + p.replace(/ /g, '%20');
    const name = p.split('/').pop().replace('.md', '');
    return `<li><a href="${url}" target="_blank" onclick="event.stopPropagation()" title="${p}">${name}</a></li>`;
  }).join('');
}

function topicCard(t) {
  const hidden = getHidden().includes(t.id);
  if (hidden && !manageMode) return '';            // hidden topics disappear in normal mode
  const cls     = `topic-card${manageMode ? ' manage' : ''}${hidden ? ' is-hidden' : ''}`;
  const onclick = manageMode ? '' : ` onclick="openTopic('${t.id}')"`;
  const hideBtn = manageMode
    ? `<button class="tc-hide${hidden ? ' unhide' : ''}" onclick="event.stopPropagation();toggleHidden('${t.id}')">${hidden ? '↩ Unhide' : '✕ Hide'}</button>`
    : '';
  const startBtn = manageMode ? ''
    : `<button class="btn btn-acc" style="background:${t.color}">Start Learning →</button>`;
  return `
    <div class="${cls}"${onclick}>
      ${hideBtn}
      <div class="tc-icon">${t.icon}</div>
      <div class="tc-title">${t.title}</div>
      <div class="tc-desc">${t.description}</div>
      <div class="tc-meta">
        <span class="tc-badge">📖 ${(t.slides||[]).length} slides</span>
        <span class="tc-badge">📝 ${(t.questions||[]).length} questions</span>
      </div>
      <details class="tc-wiki">
        <summary onclick="event.stopPropagation()">📂 ${(t.wikiPages||[]).length} wiki sources</summary>
        <ul>${wikiLinks(t.wikiPages)}</ul>
      </details>
      ${startBtn}
    </div>`;
}

function buildHome() {
  const topics = window.TOPICS || [];
  const hidden = getHidden();
  const hiddenCount = topics.filter(t => hidden.includes(t.id)).length;

  // Toolbar (above the grid) — Manage toggle + hidden count
  const toolbar = `
    <div class="home-toolbar">
      <button class="hbtn" onclick="toggleManage()">${manageMode ? '✓ Done' : '⚙️ Manage topics'}</button>
      ${manageMode
        ? `<span class="ht-note">Hide topics you don't want on the home screen — saved in this browser, reversible anytime.</span>
           ${hiddenCount ? `<span class="spacer"></span><button class="hbtn" onclick="resetHidden()">↺ Show all (${hiddenCount} hidden)</button>` : ''}`
        : (hiddenCount ? `<span class="ht-note">${hiddenCount} topic${hiddenCount === 1 ? '' : 's'} hidden — ⚙️ Manage to restore</span>` : '')}
    </div>`;
  let tb = document.getElementById('home-toolbar');
  if (tb) tb.remove();
  document.getElementById('topic-grid')
    .insertAdjacentHTML('beforebegin', `<div id="home-toolbar">${toolbar}</div>`);

  // Cards
  const addCard = manageMode ? '' : `
    <div class="topic-card" style="opacity:.55;cursor:default;border-style:dashed">
      <div class="tc-icon">➕</div>
      <div class="tc-title">Add a Topic</div>
      <div class="tc-desc">Edit <code>topics.js</code> following the TOPIC_TEMPLATE. See <code>CLAUDE.md</code> for Claude Code instructions.</div>
    </div>`;
  document.getElementById('topic-grid').innerHTML = topics.map(topicCard).join('') + addCard;
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
let activeTopic = null, activeSlide = 0, activeMode = 'slides';

function show(id) {
  const swap = () => {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+id).classList.add('active');
    window.scrollTo({ top: 0 });
  };
  // View Transitions API → seamless cross-fade between screens (graceful fallback).
  if (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.startViewTransition(swap);
  } else { swap(); }
}

function goHome() {
  CH_destroyAll();
  activeTopic = null;
  show('home');
}

function openTopic(id) {
  activeTopic = (window.TOPICS||[]).find(t=>t.id===id);
  if (!activeTopic) return;
  activeSlide = 0;
  activeMode = 'slides';
  document.getElementById('topic-title').textContent = activeTopic.icon+' '+activeTopic.title;
  setMode('slides');
  show('topic');
  buildSlides();
  goSlide(0);
}

function setMode(mode) {
  activeMode = mode;
  document.getElementById('view-slides').style.display = mode==='slides'?'':'none';
  document.getElementById('view-quiz').style.display   = mode==='quiz'?'':'none';
  document.getElementById('btn-slides').classList.toggle('active', mode==='slides');
  document.getElementById('btn-quiz').classList.toggle('active', mode==='quiz');
  if (mode==='quiz') { qIndex=0; qScore=0; qAnswered=false; renderQ(); }
}

/* ══════════════════════════════════════════════════════════
   SLIDES
══════════════════════════════════════════════════════════ */
function buildSlides() {
  const slides = (activeTopic.slides||[]);
  // Build dot nav
  document.getElementById('sdots').innerHTML = slides.map((s,i)=>
    `<button class="sdot" onclick="goSlide(${i})" title="${s.title}">${i+1}</button>`
  ).join('');
  // Build slide HTML
  document.getElementById('slides-container').innerHTML = slides.map((s,i)=>
    `<div class="slide" id="sl${i}">${renderSlide(s)}</div>`
  ).join('');
}

function goSlide(n) {
  const slides = activeTopic.slides||[];
  CH_destroyAll();
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sdot').forEach(d=>d.classList.remove('active'));
  activeSlide = n;
  document.getElementById('sl'+n)?.classList.add('active');
  document.querySelectorAll('.sdot')[n]?.classList.add('active');
  document.getElementById('slbl').textContent = slides[n]?.title||'';
  document.getElementById('sctr').textContent = `${n+1} / ${slides.length}`;
  document.getElementById('pb').disabled = n===0;
  document.getElementById('nb').textContent = n===slides.length-1 ? '📝 Take Quiz' : 'Next →';
  document.getElementById('nb').onclick = n===slides.length-1
    ? ()=>setMode('quiz')
    : ()=>nextS();
  if (slides[n]?.calc) setTimeout(initSlideCalc, 80);
}

function prevS() { if (activeSlide>0) goSlide(activeSlide-1); }
function nextS() { const l=(activeTopic.slides||[]).length; if(activeSlide<l-1) goSlide(activeSlide+1); }

/* ── Slide renderer ─────────────────────────────────────── */
function renderSlide(s) {
  const wikiLinks = (s.wikiSource||[]).map(p => {
    const name = p.split('/').pop().replace('.md','');
    const url  = 'https://github.com/lucasmasunoacn/obsidian/blob/main/'+p.replace(/ /g,'%20');
    return `<a href="${url}" target="_blank">${name}</a>`;
  }).join(' · ');

  const left = `
    <div>
      <div class="s-num">SLIDE ${s.num}</div>
      <div class="s-ttl">${s.title}</div>
      <p class="s-body">${s.body}</p>
      ${s.formula ? `<div class="fml">${s.formula}</div>` : ''}
      ${s.riskMap ? renderRiskMap() : ''}
      ${s.table   ? renderTable(s.table) : ''}
      ${(s.keyPoints||[]).map(k=>`<div class="kp ${k.color||''}">${k.text}</div>`).join('')}
      ${wikiLinks ? `<div class="wiki-src">📂 ${wikiLinks}</div>` : ''}
    </div>`;

  if (s.calc) {
    return `<div class="s2">${left}<div class="s-calc">${calcHTML(s.calc)}</div></div>`;
  }
  return `<div class="s-full">${left}</div>`;
}

function renderTable(t) {
  return `<table class="st">
    <tr>${t.headers.map(h=>`<th>${h}</th>`).join('')}</tr>
    ${t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
  </table>`;
}

function renderRiskMap() {
  const reg = [['📈','Market Risk','Interest rates, FX, equity price fluctuations ← daily exposure'],
               ['🏦','Credit Risk','Counterparty default ← daily exposure'],
               ['⚙️','Operational Risk','Errors, system failures, fraud ← sudden downside'],
               ['💧','Liquidity Risk','Unable to secure funding ← sudden downside']];

               ['📡','Systemic Risk / Settlement Risk','→ RRP (Recovery & Resolution Plan)'],
               ['⚖️','Legal Risk',''],
               ['💬','Reputational Risk','']];
  const rows = arr => arr.map(([i,n,d])=>`
    <div class="ri"><span class="ico">${i}</span>
      <div><strong>${n}</strong>${d?`<br><span>${d}</span>`:''}</div>
    </div>`).join('');
  return `<div class="rg">
    <div class="rcat"><h4 style="color:var(--acc)">📋 Regulatory Targets</h4>${rows(reg)}</div>
    <div class="rcat"><h4 style="color:var(--m)">🔲 Other Domains</h4>${rows(oth)}</div>

}

/* ══════════════════════════════════════════════════════════
   CHART MANAGER
══════════════════════════════════════════════════════════ */
const CH = {};
const isDark = () => root.getAttribute('data-theme')==='dark';
const GRD = () => ({color: isDark() ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)'});
const TCK = () => ({color: isDark() ? '#64748b' : '#9ca3af', font:{size:10}});

function CH_make(id, type, data, extra) {
  if (CH[id]) { CH[id].destroy(); }
  const opts = {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}, ...(extra?.plugins||{})},
    scales:{
      x:{ticks:TCK(),grid:GRD(), ...(extra?.x||{})},
      y:{ticks:TCK(),grid:GRD(), ...(extra?.y||{})}
    }
  };
  const el = document.getElementById(id);
  if (!el) return;
  CH[id] = new Chart(el.getContext('2d'), {type, data, options:opts});
}
function CH_destroyAll() { Object.keys(CH).forEach(k=>{CH[k].destroy();delete CH[k];}); }

function initSlideCalc() {
  const c = activeTopic?.slides[activeSlide]?.calc;
  const fns = {var:dVaR,el:dEL,lcr:dLCR,basel:dBasel,raroc:dRAROC,kvcache:dKV,sw30:dSW30};
  if (c && fns[c]) fns[c]();
}

/* ── VaR ── */
function dVaR(){
  const P=+document.getElementById('v-p')?.value||1000;
  const V=(+document.getElementById('v-v')?.value||1.5)/100;
  const D=+document.getElementById('v-d')?.value||10;
  const z=+document.getElementById('v-c')?.value||2.326;
  const sig=V*Math.sqrt(D)*P, var_=z*sig;
  const conf=document.getElementById('v-c')?.selectedOptions[0]?.text||'99%';
  const rv=document.getElementById('v-rv'); if(rv) rv.textContent=var_.toFixed(1)+' 億円';
  const rs=document.getElementById('v-rs'); if(rs) rs.textContent=conf+' · '+D+'d | σ_eff='+sig.toFixed(1)+'億';
  const N=120,xm=-4.5*sig,xM=4.5*sig,st=(xM-xm)/N;
  const xs=[],ty=[],my=[];
  for(let i=0;i<=N;i++){const x=xm+i*st,y=Math.exp(-0.5*(x/sig)**2)/(sig*Math.sqrt(2*Math.PI));
    xs.push(x.toFixed(0));ty.push(x<=-var_?y:null);my.push(x>-var_?y:null);}
  CH_make('cv','line',{labels:xs,datasets:[
    {data:ty,borderColor:'rgba(239,68,68,.8)',backgroundColor:'rgba(239,68,68,.15)',fill:true,pointRadius:0,tension:.4},
    {data:my,borderColor:'rgba(88,101,242,.7)',backgroundColor:'rgba(88,101,242,.08)',fill:true,pointRadius:0,tension:.4}
  ]},{x:{ticks:{...TCK(),maxTicksLimit:7,callback(v){return parseFloat(this.getLabelForValue(v)).toFixed(0)+'億'}}},y:{display:false}});
}

/* ── EL ── */
function dEL(){
  const pd=+document.getElementById('el-pd')?.value/100||.02;
  const ea=+document.getElementById('el-ea')?.value||100;
  const lg=+document.getElementById('el-lg')?.value/100||.45;
  const pdv=document.getElementById('pd-v'); if(pdv) pdv.textContent=(pd*100).toFixed(1)+'%';
  const lgv=document.getElementById('lgd-v'); if(lgv) lgv.textContent=(lg*100).toFixed(0)+'%';
  const el=pd*ea*lg;
  const rv=document.getElementById('el-rv'); if(rv) rv.textContent=el.toFixed(3)+' 億円';
  const rs=document.getElementById('el-rs'); if(rs) rs.textContent=`${(pd*100).toFixed(2)}% × ${ea}億 × ${(lg*100).toFixed(0)}%`;
  CH_make('ce','bar',{
    labels:['EAD Breakdown'],
    datasets:[
      {label:'EL',data:[el],backgroundColor:'rgba(239,68,68,.75)',borderRadius:4},
      {label:'Recovery',data:[Math.max(ea-el,0)],backgroundColor:'rgba(88,101,242,.4)',borderRadius:4}
    ]
  },{plugins:{legend:{display:true,labels:{color:isDark()?'#94a3b8':'#6b7280',font:{size:9},boxWidth:9}}},
     x:{ticks:{display:false}},y:{ticks:{...TCK(),callback:v=>v+'億'},stacked:true},stacked:true});
  if(CH.ce){CH.ce.options.scales.x.stacked=true;CH.ce.options.scales.y.stacked=true;CH.ce.update();}
}

/* ── LCR ── */
function dLCR(){
  const l1=+document.getElementById('lc-l1')?.value||0;
  const l2=+document.getElementById('lc-2a')?.value||0;
  const ot=+document.getElementById('lc-ot')?.value||1;
  const inf=+document.getElementById('lc-in')?.value||0;
  const hqla=l1+l2*.85, net=Math.max(ot-inf,.001), lcr=hqla/net*100;
  const rv=document.getElementById('lc-rv'); if(rv) rv.textContent=lcr.toFixed(1)+'%';
  const rs=document.getElementById('lc-rs'); if(rs){rs.textContent=lcr>=100?'✓ ≥100% achieved':'✗ Below 100% requirement';rs.style.color=lcr>=100?'var(--grn)':'var(--red)';}
  CH_make('cl','bar',{
    labels:['Lv1 Assets','Lv2A×85%','HQLA Total','Net Outflow'],
    datasets:[{data:[l1,l2*.85,hqla,net],
      backgroundColor:['rgba(16,185,129,.75)','rgba(16,185,129,.4)','rgba(88,101,242,.75)','rgba(239,68,68,.65)'],
      borderRadius:4}]
  },{y:{ticks:{...TCK(),callback:v=>v+'億'}}});
}

/* ── Basel ── */
function dBasel(){
  const c1=+document.getElementById('bs-c1')?.value||0, a1=+document.getElementById('bs-a1')?.value||0;
  const t2=+document.getElementById('bs-t2')?.value||0, cr=+document.getElementById('bs-cr')?.value||1;
  const mo=+document.getElementById('bs-mo')?.value||0, rwa=cr+mo||1;
  const rc=c1/rwa*100, rt=(c1+a1)/rwa*100, rT=(c1+a1+t2)/rwa*100;
  const rv=document.getElementById('bs-rv'); if(rv) rv.textContent=rT.toFixed(2)+'% / CET1 '+rc.toFixed(2)+'%';
  const ok=rT>=8&&rc>=4.5;
  const rs=document.getElementById('bs-rs'); if(rs){rs.textContent=ok?'✓ Basel III minimums met':'✗ Below minimum';rs.style.color=ok?'var(--grn)':'var(--red)';}
  CH_make('cb','bar',{
    labels:['CET1 Ratio','Tier1 Ratio','Total Capital'],
    datasets:[
      {label:'Actual',data:[rc,rt,rT],backgroundColor:['rgba(88,101,242,.75)','rgba(167,139,250,.75)','rgba(16,185,129,.75)'],borderRadius:4},
      {label:'Minimum',data:[4.5,6.0,8.0],backgroundColor:['rgba(239,68,68,.4)','rgba(239,68,68,.4)','rgba(239,68,68,.4)'],borderRadius:4}
    ]
  },{plugins:{legend:{display:true,labels:{color:isDark()?'#94a3b8':'#6b7280',font:{size:9},boxWidth:9}}},
     y:{ticks:{...TCK(),callback:v=>v+'%'}}});
}

/* ── RAROC ── */
function dRAROC(){
  const ra=+document.getElementById('ra-ra')?.value||0, xa=+document.getElementById('ra-xa')?.value||0;
  const ea=Math.max(+document.getElementById('ra-ea')?.value,1);
  const rb=+document.getElementById('ra-rb')?.value||0, xb=+document.getElementById('ra-xb')?.value||0;
  const eb=Math.max(+document.getElementById('ra-eb')?.value,1);
  const rA=(ra-xa)/ea*100, rB=(rb-xb)/eb*100;
  CH_make('cr','bar',{
    labels:['Revenue','Risk','Adj. Revenue','RAROC(%)'],
    datasets:[
      {label:'Dept A',data:[ra,xa,ra-xa,rA],backgroundColor:'rgba(88,101,242,.72)',borderRadius:4},
      {label:'Dept B',data:[rb,xb,rb-xb,rB],backgroundColor:'rgba(245,158,11,.72)',borderRadius:4}
    ]
  },{plugins:{legend:{display:true,labels:{color:isDark()?'#94a3b8':'#6b7280',font:{size:9},boxWidth:9}}}});
  const v=document.getElementById('ra-verd');
  if(v){if(rA>rB)v.innerHTML=`<span style="color:var(--grn)">▲ Dept A higher RAROC (${rA.toFixed(0)}% > ${rB.toFixed(0)}%) → prioritize Dept A for EC</span>`;
    else if(rB>rA)v.innerHTML=`<span style="color:var(--yel)">▲ Dept B higher RAROC (${rB.toFixed(0)}% > ${rA.toFixed(0)}%) → prioritize Dept B for EC</span>`;
    else v.textContent='Departments have equal RAROC';}
}

/* ── KV Cache ── */
function dKV(){
  const L=+document.getElementById('kv-l')?.value||32, H=+document.getElementById('kv-h')?.value||4096;
  const C=+document.getElementById('kv-c')?.value||128000, B=+document.getElementById('kv-b')?.value||2;
  const gb=2*L*H*C*B/1073741824;
  const rv=document.getElementById('kv-rv'); if(rv) rv.textContent=gb.toFixed(2)+' GB';
  const rs=document.getElementById('kv-rs'); if(rs) rs.textContent=`2×${L}L×${H}H×${(C/1000).toFixed(0)}kCtx×${B}B`;
  // Bar chart: KV cache vs typical GPU memory
  CH_make('ck','bar',{
    labels:['KV Cache','A100 80GB','H100 80GB','RTX 4090 24GB'],
    datasets:[{data:[gb,80,80,24],
      backgroundColor:['rgba(88,101,242,.75)','rgba(16,185,129,.5)','rgba(16,185,129,.5)','rgba(245,158,11,.5)'],
      borderRadius:4}]
  },{y:{ticks:{...TCK(),callback:v=>v+'GB'}}});
}

/* ══════════════════════════════════════════════════════════
   QUIZ ENGINE
══════════════════════════════════════════════════════════ */
let qIndex=0, qScore=0, qAnswered=false;

// Linked wiki pages shown when a card flips to its answer. Prefers a per-question
// `src` array (paths into the obsidian wiki); falls back to the topic's wikiPages.
function qSrcLinks(q){
  const pages = (q && Array.isArray(q.src) && q.src.length) ? q.src : (activeTopic?.wikiPages || []);
  if(!pages.length) return '';
  const links = pages.map(p=>{
    const url = WIKI_BASE + p.replace(/ /g,'%20');
    const name = p.split('/').pop().replace('.md','');
    return `<a class="esl" href="${url}" target="_blank" rel="noopener" title="${p}">${name}</a>`;
  }).join(' · ');
  return `<div class="exp-src">📂 Linked pages: ${links}</div>`;
}

function renderQ(){
  const qs=activeTopic?.questions||[];
  document.getElementById('qctr').textContent=`Q ${qIndex+1} / ${qs.length}`;
  document.getElementById('pf').style.width=`${(qIndex/qs.length)*100}%`;
  document.getElementById('qsc').textContent=`✓ ${qScore}`;
  const q=qs[qIndex];
  if(!q)return;
  const L=['A','B','C','D'];
  document.getElementById('qcard').innerHTML=`
    <div class="qcat">${q.cat}</div>
    <div class="qtxt">Q${qIndex+1}. ${q.q}</div>
    ${q.hint?`<div class="qhnt">💡 ${q.hint}</div>`:''}
    <div class="opts" id="opts">
      ${q.opts.map((o,i)=>`<button class="opt" onclick="pickQ(${i})" id="o${i}"><span class="olbl">${L[i]}</span>${o}</button>`).join('')}
    </div>`;
  qAnswered=false;
  document.getElementById('qnav').style.display='none';
}

function pickQ(i){
  if(qAnswered)return; qAnswered=true;
  const q=(activeTopic?.questions||[])[qIndex];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  if(i===q.ans){qScore++;document.getElementById(`o${i}`).classList.add('correct');document.querySelector(`#o${i} .olbl`).textContent='✓';}
  else{document.getElementById(`o${i}`).classList.add('wrong');document.querySelector(`#o${i} .olbl`).textContent='✗';
    document.getElementById(`o${q.ans}`).classList.add('correct');document.querySelector(`#o${q.ans} .olbl`).textContent='✓';}
  document.getElementById('qsc').textContent=`✓ ${qScore}`;
  const e=document.createElement('div');e.className='exp';e.innerHTML=`📖 ${q.exp}${qSrcLinks(q)}`;
  document.getElementById('opts').after(e);
  document.getElementById('qnav').style.display='flex';
  document.getElementById('nxt').textContent=qIndex===(activeTopic?.questions||[]).length-1?'See Results 🏆':'Next →';
}

function nextQ(){
  qIndex++;
  if(qIndex>=(activeTopic?.questions||[]).length) showResults();
  else renderQ();
}

function showResults(){
  const qs=activeTopic?.questions||[], p=Math.round(qScore/qs.length*100);
  let msg,sub,col;
  if(p>=90){msg="Excellent 🏆";sub="Deep understanding demonstrated!";col='var(--grn)'}
  else if(p>=70){msg="Good 👍";sub="Review the slides on weaker areas.";col='var(--acc)'}
  else if(p>=50){msg="Getting there 📚";sub="Go back through the slides and retry.";col='var(--yel)'}
  else{msg="Keep studying 📖";sub="Start from Slide 1 and work through.";col='var(--red)'}
  document.getElementById('qcard').innerHTML=`
    <div class="results">
      <div class="sring" style="background:conic-gradient(${col} ${p*3.6}deg,var(--brd) 0)">
        <div class="sinn"><div class="sn">${qScore}</div><div class="sd">/ ${qs.length}</div></div>
      </div>
      <div class="smsg">${msg} — ${p}%</div>
      <div class="ssub">${sub}</div>
      <div class="btn-row">
        <button class="btn btn-sec" onclick="qIndex=0;qScore=0;qAnswered=false;renderQ()">Retry</button>
        <button class="btn btn-acc" onclick="setMode('slides')">Back to Slides</button>
      </div>
    </div>`;
  document.getElementById('qnav').style.display='none';
  document.getElementById('pf').style.width='100%';
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
function openTranslate(e) {
  e.preventDefault();
  const existing = document.getElementById('xlate-tip');
  if (existing) { existing.remove(); return; }
  const tip = document.createElement('div');
  tip.id = 'xlate-tip';
  tip.innerHTML = `
    <button onclick="document.getElementById('xlate-tip').remove()"
      style="float:right;background:none;border:none;cursor:pointer;color:var(--m);font-size:1.1rem;line-height:1">✕</button>
    <strong>🌐 Translate this page</strong><br><br>
    Use your <strong>browser's built-in translate</strong> — it preserves full quiz interactivity:<br><br>
    🖥️ <strong>Desktop:</strong> Right-click anywhere on the page → "Translate to [language]"<br><br>
    📱 <strong>Mobile:</strong> Tap the <strong>translate icon</strong> that appears in the address bar<br><br>
    <small style="color:var(--m2)">Google Translate proxy blocks button clicks — use browser-native translate instead.</small>
  `;
  tip.style.cssText = 'position:fixed;top:58px;right:12px;background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;font-size:.82rem;max-width:290px;box-shadow:var(--sh-lg);z-index:300;line-height:1.6;color:var(--txt)';
  document.body.appendChild(tip);
  setTimeout(() => tip?.remove(), 10000);
}
