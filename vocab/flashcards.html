<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain — Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e7eaf1;--surf:#e7eaf1;--card:#e7eaf1;--brd:transparent;--div:#ccd3e0;
  --acc:#5865f2;--grn:#10b981;--red:#ef4444;--yel:#f59e0b;--pur:#7c3aed;--blue:#3b82f6;
  --txt:#2b3350;--m:#697089;--m2:#8a92a6;
  --d-sh:#b6bfd0;--l-sh:#ffffff;
  --sh:6px 6px 14px var(--d-sh),-6px -6px 14px var(--l-sh);
  --sh-lg:10px 10px 24px var(--d-sh),-9px -9px 22px var(--l-sh);
  --sh-sm:4px 4px 9px var(--d-sh),-4px -4px 9px var(--l-sh);
  --sh-press:inset 2px 2px 4px var(--d-sh),inset -2px -2px 4px var(--l-sh);
}
[data-theme="dark"]{
  --bg:#2a2e37;--surf:#2a2e37;--card:#2a2e37;--brd:transparent;--div:#3a3f4b;
  --txt:#e6e9f0;--m:#9aa3b5;--m2:#7f8799;--d-sh:#1f2228;--l-sh:#353a45;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,system-ui,sans-serif;background:var(--bg);
  color:var(--txt);min-height:100vh;transition:background .25s,color .25s}
strong{font-weight:800}
header{background:var(--bg);
  box-shadow:0 6px 16px var(--d-sh),inset 0 1px 0 var(--l-sh);border-bottom:1px solid var(--div);
  padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:1.1rem;font-weight:800;color:var(--acc);flex:1}
.logo span{color:var(--txt);font-weight:400;font-size:.85rem;margin-left:8px}
.hbtn{border:none;background:var(--surf);color:var(--m);cursor:pointer;border-radius:50%;
  width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;font-size:1.05rem;
  box-shadow:var(--sh-sm);text-decoration:none;transition:box-shadow .14s,color .15s}
.hbtn:hover{color:var(--acc)}.hbtn:active{box-shadow:var(--sh-press)}
main{max-width:680px;margin:0 auto;padding:24px 18px 60px}

/* Deck picker */
.cat-select{width:100%;margin-bottom:14px;font-family:inherit;font-size:.84rem;font-weight:700;color:var(--txt);
  background:var(--surf);border:none;border-radius:12px;padding:12px 40px 12px 16px;min-height:46px;cursor:pointer;
  box-shadow:var(--sh-sm);appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23697089' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat:no-repeat;background-position:right 15px center}
.cat-select:focus{outline:none;box-shadow:var(--sh-press)}

/* Stat row */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border-radius:14px;padding:11px 8px;box-shadow:var(--sh-sm);text-align:center}
.stat .v{font-size:1.25rem;font-weight:800;line-height:1.1}
.stat .l{font-size:.66rem;color:var(--m2);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.stat.new .v{color:var(--blue)} .stat.due .v{color:var(--yel)} .stat.done .v{color:var(--grn)}

/* Card */
.scene{perspective:1400px;margin:6px 0 18px}
.fcard{position:relative;width:100%;min-height:300px;transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,.15,.2,1);cursor:pointer}
.fcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border-radius:22px;box-shadow:var(--sh-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 26px;gap:8px}
.back{transform:rotateY(180deg)}
.tag{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--acc);
  background:var(--surf);box-shadow:var(--sh-sm);padding:4px 11px;border-radius:99px;margin-bottom:6px}
.term{font-size:1.9rem;font-weight:800;line-height:1.2}
.full{font-size:.95rem;color:var(--m2);font-family:ui-monospace,Menlo,Consolas,monospace}
.def{font-size:1rem;color:var(--txt);line-height:1.65;max-width:520px}
.def em{color:var(--pur);font-style:normal;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.95em}
.flip-hint{position:absolute;bottom:14px;left:0;right:0;font-size:.7rem;color:var(--m2)}
.wlink{display:inline-block;margin-top:10px;font-size:.72rem;color:var(--m);text-decoration:none;
  padding:4px 11px;border-radius:99px;background:var(--surf);box-shadow:var(--sh-sm);font-weight:600}
.wlink:hover{color:var(--acc)}

/* Controls */
.reveal-row{display:flex;justify-content:center}
.reveal{border:none;background:var(--acc);color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;
  border-radius:14px;padding:0 30px;min-height:52px;box-shadow:var(--sh-sm);transition:box-shadow .14s,filter .15s}
.reveal:hover{filter:brightness(1.07)}.reveal:active{box-shadow:var(--sh-press)}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.grade{border:none;background:var(--surf);cursor:pointer;border-radius:14px;padding:11px 6px;min-height:62px;
  box-shadow:var(--sh-sm);display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:box-shadow .14s,transform .12s;font-family:inherit}
.grade:active{box-shadow:var(--sh-press);transform:scale(.97)}
.grade .g{font-weight:800;font-size:.86rem}
.grade .iv{font-size:.66rem;color:var(--m2);font-weight:600}
.grade.again .g{color:var(--red)} .grade.hard .g{color:var(--yel)}
.grade.good .g{color:var(--grn)}  .grade.easy .g{color:var(--blue)}
.kbd{font-size:.6rem;color:var(--m2);margin-top:1px}

/* Done / empty */
.done{text-align:center;background:var(--card);border-radius:22px;box-shadow:var(--sh-lg);padding:40px 26px}
.done .em{font-size:2.6rem;margin-bottom:8px}
.done h3{font-size:1.3rem;font-weight:800;margin-bottom:6px}
.done p{color:var(--m);font-size:.88rem;margin-bottom:20px;line-height:1.6}
.done .row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.tool{border:none;background:var(--surf);color:var(--m);font-weight:700;font-size:.82rem;padding:0 18px;min-height:44px;
  border-radius:12px;cursor:pointer;box-shadow:var(--sh-sm);transition:box-shadow .14s,color .15s}
.tool:hover{color:var(--acc)}.tool:active{box-shadow:var(--sh-press)}
.tool.accent{background:var(--acc);color:#fff}
.dir-row{display:flex;justify-content:flex-end;margin-bottom:8px}
.dir-btn{min-height:34px;font-size:.72rem;padding:0 12px}
footer{text-align:center;padding:24px;font-size:.72rem;color:var(--m2);border-top:1px solid var(--div);margin-top:30px}
footer a{color:var(--acc)}
@media (prefers-reduced-motion:reduce){.fcard{transition:none}*,::before,::after{animation-duration:.001ms!important}}
</style>
</head>
<body>

<header>
  <div class="logo">🧠 Second Brain <span>Flashcards</span></div>
  <a class="hbtn" href="index.html" title="Vocabulary dictionary" aria-label="Vocabulary dictionary">📚</a>
  <a class="hbtn" href="../quiz/" title="Quiz" aria-label="Quiz">📝</a>
  <button class="hbtn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark" aria-label="Toggle light/dark">🌙</button>
</header>

<main>
  <select class="cat-select" id="deckSelect" onchange="setDeck(this.value)" aria-label="Choose deck"></select>
  <div class="stats" id="stats"></div>
  <div class="dir-row"><button class="tool dir-btn" id="dirBtn" onclick="toggleDir()">🔁 Term → Definition</button></div>
  <div id="stage"></div>
</main>

<footer>
  Spaced-repetition (SM-2) · progress saved in your browser ·
  <a href="index.html">Dictionary</a> · <a href="../quiz/">Quiz</a>
</footer>

<script src="vocab.js"></script>
<script>
/* ── Theme (shared key) ── */
const root=document.documentElement, themeBtn=document.getElementById('theme-btn');
const initTheme=localStorage.getItem('quiz-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
root.setAttribute('data-theme',initTheme); themeBtn.textContent=initTheme==='dark'?'☀️':'🌙';
function toggleTheme(){const t=root.getAttribute('data-theme')==='dark'?'light':'dark';
  root.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('quiz-theme',t);}

/* ── Data ── */
const VOCAB=(window.VOCAB||[]).slice();
const WIKI_BASE=window.VOCAB_WIKI_BASE||'';
const CATS=[...new Set(VOCAB.map(v=>v.cat))];
const DAY=864e5, NEW_PER_SESSION=20, MIN_EASE=1.3;
const SRS_KEY='sb-srs-v1', DECK_KEY='sb-fc-deck', DIR_KEY='sb-fc-dir';

const srs=(()=>{try{return JSON.parse(localStorage.getItem(SRS_KEY)||'{}');}catch{return{};}})();
const saveSrs=()=>localStorage.setItem(SRS_KEY,JSON.stringify(srs));
let activeDeck=localStorage.getItem(DECK_KEY)||'all';
let dir=localStorage.getItem(DIR_KEY)||'fwd';            // fwd: term→def, rev: def→term
let queue=[], current=null, flipped=false, reviewed=0;

function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function deckCards(){return activeDeck==='all'?VOCAB:VOCAB.filter(v=>v.cat===activeDeck);}

/* ── SM-2 ── */
function blankState(){return{ease:2.5,interval:0,reps:0,lapses:0,due:0};}
// Pure: compute the next state for a grade without mutating.
function schedule(s,grade){
  s={...s}; const r=s.reps;
  if(grade==='again'){s.ease=Math.max(MIN_EASE,s.ease-0.2);s.reps=0;s.lapses++;s.interval=0;}
  else if(grade==='hard'){s.ease=Math.max(MIN_EASE,s.ease-0.15);s.interval=r===0?1:Math.max(1,Math.round(s.interval*1.2));s.reps=r+1;}
  else if(grade==='good'){s.interval=r===0?1:(r===1?3:Math.round(s.interval*s.ease));s.reps=r+1;}
  else{s.ease=s.ease+0.15;s.interval=r===0?2:(r===1?4:Math.round(s.interval*s.ease*1.3));s.reps=r+1;} // easy
  s.due=grade==='again'?Date.now():Date.now()+s.interval*DAY;
  return s;
}
function ivLabel(s,grade){
  if(grade==='again')return '<1m';
  const d=schedule(s,grade).interval;
  if(d<1)return '<1d'; if(d<30)return d+'d';
  const mo=d/30; return (mo<10?mo.toFixed(1):Math.round(mo))+'mo';
}

/* ── Queue ── */
function buildQueue(){
  const now=Date.now(), cards=deckCards(), due=[], fresh=[];
  for(const v of cards){const s=srs[v.term];
    if(!s||!s.reps&&!s.due) fresh.push(v); else if(s.due<=now) due.push(v);}
  due.sort((a,b)=>srs[a.term].due-srs[b.term].due);
  queue=[...due,...shuffle(fresh).slice(0,NEW_PER_SESSION)];
  reviewed=0;
}
function counts(){
  const now=Date.now(), cards=deckCards(); let nw=0,due=0;
  for(const v of cards){const s=srs[v.term];
    if(!s||!s.reps&&!s.due)nw++; else if(s.due<=now)due++;}
  return{nw,due,total:cards.length};
}

/* ── Render ── */
function renderDecks(){
  const all=[['all','All',VOCAB.length]].concat(CATS.map(c=>[c,c,VOCAB.filter(v=>v.cat===c).length]));
  document.getElementById('deckSelect').innerHTML=all.map(([id,label,n])=>
    `<option value="${esc(id)}"${id===activeDeck?' selected':''}>${esc(label)} (${n})</option>`).join('');
}
function renderStats(){
  const c=counts();
  document.getElementById('stats').innerHTML=`
    <div class="stat new"><div class="v">${c.nw}</div><div class="l">New</div></div>
    <div class="stat due"><div class="v">${c.due}</div><div class="l">Due</div></div>
    <div class="stat done"><div class="v">${reviewed}</div><div class="l">Reviewed</div></div>`;
}
function setDeck(d){activeDeck=d;localStorage.setItem(DECK_KEY,d);renderDecks();start();}
function toggleDir(){dir=dir==='fwd'?'rev':'fwd';localStorage.setItem(DIR_KEY,dir);
  document.getElementById('dirBtn').textContent=dir==='fwd'?'🔁 Term → Definition':'🔁 Definition → Term';
  start();}

function start(){buildQueue();renderStats();next();}
function next(){
  flipped=false; current=queue[0]||null;
  if(!current){renderDone();return;}
  renderCard();
}
function renderCard(){
  const v=current, s=srs[v.term]||blankState();
  const front=dir==='fwd'
    ? `<div class="tag">${esc(v.cat)}</div><div class="term">${esc(v.term)}</div>${v.full?`<div class="full">${esc(v.full)}</div>`:''}`
    : `<div class="tag">${esc(v.cat)}</div><div class="def">${v.def}</div>`;
  const back=dir==='fwd'
    ? `<div class="tag">${esc(v.cat)}</div><div class="def">${v.def}</div>${wlink(v)}`
    : `<div class="tag">${esc(v.cat)}</div><div class="term">${esc(v.term)}</div>${v.full?`<div class="full">${esc(v.full)}</div>`:''}${wlink(v)}`;
  document.getElementById('stage').innerHTML=`
    <div class="scene"><div class="fcard" id="fcard" onclick="flip()">
      <div class="face front">${front}<div class="flip-hint">tap or press Space to flip</div></div>
      <div class="face back">${back}</div>
    </div></div>
    <div id="controls"><div class="reveal-row"><button class="reveal" onclick="flip()">Show answer</button></div></div>`;
}
function wlink(v){return v.wiki?`<a class="wlink" href="${WIKI_BASE}${v.wiki.replace(/ /g,'%20')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📂 ${esc(v.wiki.split('/').pop().replace('.md',''))}</a>`:'';}
function flip(){
  if(flipped)return; flipped=true;
  document.getElementById('fcard').classList.add('flipped');
  const s=srs[current.term]||blankState();
  document.getElementById('controls').innerHTML=`<div class="grades">
    ${[['again','Again'],['hard','Hard'],['good','Good'],['easy','Easy']].map(([g,lbl],i)=>
      `<button class="grade ${g}" onclick="rate('${g}')"><span class="g">${lbl}</span><span class="iv">${ivLabel(s,g)}</span><span class="kbd">${i+1}</span></button>`).join('')}
  </div>`;
}
function rate(grade){
  if(!flipped||!current)return;
  const v=current, s=srs[v.term]||blankState();
  srs[v.term]=schedule(s,grade); saveSrs();
  queue.shift();
  if(grade==='again') queue.splice(Math.min(3,queue.length),0,v);  // re-show soon
  reviewed++; renderStats(); next();
}
function renderDone(){
  const c=counts();
  document.getElementById('stage').innerHTML=`
    <div class="done">
      <div class="em">${reviewed?'🎉':'✨'}</div>
      <h3>${reviewed?`Reviewed ${reviewed} card${reviewed===1?'':'s'}`:'Nothing due here'}</h3>
      <p>${c.due+c.nw>0?`Still ${c.nw} new / ${c.due} due in this deck.`:'No cards due in this deck right now — spaced repetition will bring them back when it’s time.'}</p>
      <div class="row">
        ${c.due+c.nw>0?'<button class="tool accent" onclick="start()">Keep going →</button>':''}
        <button class="tool" onclick="resetDeck()">↺ Reset this deck</button>
        <a class="tool" href="index.html" style="display:inline-flex;align-items:center">📚 Dictionary</a>
      </div>
    </div>`;
}
function resetDeck(){
  if(!confirm('Reset spaced-repetition progress for this deck?'))return;
  for(const v of deckCards()) delete srs[v.term];
  saveSrs(); renderStats(); start();
}

/* Keyboard: space/enter flips; 1-4 grade */
document.addEventListener('keydown',e=>{
  if(!current)return;
  if((e.key===' '||e.key==='Enter')&&!flipped){e.preventDefault();flip();return;}
  if(flipped){const map={'1':'again','2':'hard','3':'good','4':'easy'};if(map[e.key]){e.preventDefault();rate(map[e.key]);}}
});

/* Init */
document.getElementById('dirBtn').textContent=dir==='fwd'?'🔁 Term → Definition':'🔁 Definition → Term';
if(!VOCAB.length){document.getElementById('stage').innerHTML='<div class="done"><div class="em">📭</div><h3>No vocabulary yet</h3><p>Add terms via the Requests page, then process them into vocab.js.</p></div>';}
else{renderDecks();start();}
</script>
</body>
</html>
